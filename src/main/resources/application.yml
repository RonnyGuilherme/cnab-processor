spring:
  application:
    name: cnab-processor

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE
    # driver-class-name: org.h2.Driver   ← REMOVA esta linha
    username: sa
    password:
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false          # agora dentro de jpa, corretamente

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 52MB

  flyway:
    enabled: false

  batch:
    job:
      enabled: false            # Jobs via API — não dispara no startup
    jdbc:
      initialize-schema: never  # Flyway gerencia o schema

  thymeleaf:
    check-template-location: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  metrics:                      # ← agora irmão de endpoints (mesmo nível)
    tags:
      application: cnab-processor

logging:
  level:
    com.seuportfolio.cnab_processor: DEBUG
    org.springframework.batch: INFO
    org.flywaydb: INFO

cnab:
  batch:
    chunk-size: 100
  upload:                       # ← upload é irmão de batch, não filho
    temp-dir: ${java.io.tmpdir}/cnab-processor