spring:
  application:
    name: cnab-processor

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE
      driver-class-name: org.h2.Driver
      username: sa
      password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  flyway:
    enabled: false

  batch:
    job:
      enabled: false        # Jobs via API — não dispara no startup
    jdbc:
      initialize-schema: never # Flyway (V2__create_spring_batch_tables.sql) gerencia o schema.
        # Se ficasse "always", o Spring Batch tentaria recriar as tabelas
      # e conflitaria com as já criadas pelo Flyway.

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus

logging:
  level:
    com.seuportfolio.cnab_processor: DEBUG
    org.springframework.batch: INFO
    org.flywaydb: INFO

cnab:
  batch:
    chunk-size: 10                # Chunk menor facilita a verificação nos testes