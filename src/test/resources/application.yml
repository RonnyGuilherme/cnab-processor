spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  flyway:
    enabled: false       # Flyway desabilitado — DDL gerenciado pelo Hibernate no teste

  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always   # Cria as tabelas do Spring Batch no H2

  # no application-test.yml (ou temporariamente no teste)
  logging:
    level:
      com.seuportfolio.cnab_processor: DEBUG
